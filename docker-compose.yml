version: '3.8'

services:
  # =====================================================================
  # 基础设施（MySQL 使用宿主机 3306 端口，不再启动容器）
  # =====================================================================

  # Nacos 注册中心/配置中心
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: cloud-takeout-nacos
    environment:
      MODE: standalone
    ports:
      - "${NACOS_PORT}:8848"
      - "9850:9848"
    networks:
      - takeout-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: cloud-takeout-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5673:5672"
      - "15673:15672"
    networks:
      - takeout-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # =====================================================================
  # 后端微服务
  # =====================================================================

  # 用户服务（含商家/店铺功能）
  user-service:
    build: ./user-service
    container_name: cloud-takeout-user
    ports:
      - "${USER_SERVICE_PORT}:8081"
    depends_on:
      nacos:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
    networks:
      - takeout-network

  # 菜品服务
  dish-service:
    build: ./dish_service
    container_name: cloud-takeout-dish
    ports:
      - "${DISH_SERVICE_PORT}:8083"
    depends_on:
      nacos:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
    networks:
      - takeout-network

  # 订单服务
  order-service:
    build: ./order-service
    container_name: cloud-takeout-order
    ports:
      - "${ORDER_SERVICE_PORT}:8082"
    depends_on:
      nacos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_DEFAULT_USER}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS}
    networks:
      - takeout-network

  # 积分服务
  points-service:
    build: ./points-service
    container_name: cloud-takeout-points
    ports:
      - "${POINTS_SERVICE_PORT}:8085"
    depends_on:
      nacos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - takeout-network

  # 通知服务
  notification-service:
    build: ./notification-service
    container_name: cloud-takeout-notification
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8084"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_DEFAULT_USER}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS}
    networks:
      - takeout-network

  # 配送服务
  delivery-service:
    build: ./delivery-service
    container_name: cloud-takeout-delivery
    ports:
      - "${DELIVERY_SERVICE_PORT}:8086"
    depends_on:
      nacos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_DEFAULT_USER}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_DEFAULT_PASS}
    networks:
      - takeout-network

  # API 网关
  gateway:
    build: ./gateway
    container_name: cloud-takeout-gateway
    ports:
      - "${GATEWAY_PORT}:8080"
    depends_on:
      nacos:
        condition: service_healthy
      user-service:
        condition: service_started
      order-service:
        condition: service_started
      dish-service:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - JWT_SECRET=cloud-takeout-secret-key-2026-512-bit-long-secure-key-for-jwt-signing
    networks:
      - takeout-network

  # =====================================================================
  # 前端
  # =====================================================================

  # Vue 前端
  web:
    build: ./cloud-takeout-web
    container_name: cloud-takeout-web
    ports:
      - "${WEB_PORT}:80"
    depends_on:
      - gateway
    networks:
      - takeout-network

# =====================================================================
# 网络配置
# =====================================================================
networks:
  takeout-network:
    driver: bridge

# =====================================================================
# 不使用 Docker MySQL，无需数据卷
# =====================================================================
