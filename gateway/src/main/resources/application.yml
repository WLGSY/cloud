server:
  port: 8087

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      discovery:
        locator:
          enabled: false
      # 新增：全局CORS跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: [GET,POST,PUT,DELETE,OPTIONS,PATCH]
            allowedHeaders: ["Content-Type","Authorization","X-Requested-With","Accept","Origin"]
            allowCredentials: false
            maxAge: 3600

      routes:
        # 用户服务路由
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-Service, user-service

        # 菜品服务路由
        - id: dish-service
          uri: lb://dish-service
          predicates:
            - Path=/api/dish/**
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-Service, dish-service

        # 订单服务路由
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-Service, order-service

        # 店铺服务路由（由user-service托管）
        - id: shop-service
          uri: lb://user-service
          predicates:
            - Path=/api/shop/**
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-Service, shop-service

        # 积分服务路由
        - id: points-service
          uri: lb://points-service
          predicates:
            - Path=/api/points/**
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-Service, points-service

        # 配送服务路由
        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/api/delivery/**
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-Service, delivery-service

    # Sentinel配置
    sentinel:
      transport:
        dashboard: localhost:8080
        port: 8719
      eager: true
      filter:
        enabled: true

# JWT配置（必须与用户服务一致）
jwt:
  secret: cloud-takeout-secret-key-2026-512-bit-long-secure-key-for-jwt-signing

# 网关自定义配置
gateway:
  filter:
    # 慢请求阈值（毫秒），超过此值打印告警日志
    slow-request-threshold: 500
    # 是否启用详细日志
    enable-detail-log: true

# 白名单配置（不需要鉴权的路径）
whitelist:
  paths:
    - /api/user/login
    - /api/user/register
    - /api/shop/register
    - /api/shop/all
    - /api/dish/list
    - /api/dish/search
    - /api/dish/test/host
    - /v3/api-docs
    - /swagger-ui
    - /swagger-resources

# 日志配置
logging:
  level:
    com.hnkjzy.gateway: debug