server:
  port: 8087

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      routes:
        # 用户服务路由
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-Service, user-service

        # 菜品服务路由
        - id: dish-service
          uri: lb://dish-service
          predicates:
            - Path=/api/dish/**
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-Service, dish-service

        # 订单服务路由
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-Service, order-service

    # Sentinel配置
    sentinel:
      transport:
        dashboard: localhost:8080
        port: 8719
      eager: true
      filter:
        enabled: true

# JWT配置（必须与用户服务一致）
jwt:
  secret: cloud-takeout-secret-key-2026-512-bit-long-secure-key-for-jwt-signing

# 网关自定义配置
gateway:
  filter:
    # 慢请求阈值（毫秒），超过此值打印告警日志
    slow-request-threshold: 500
    # 是否启用详细日志
    enable-detail-log: true

# 白名单配置（不需要鉴权的路径）
whitelist:
  paths:
    - /api/user/login
    - /api/user/register
    - /api/dish/list
    - /api/dish/search
    - /api/dish/test/host
    - /v3/api-docs
    - /swagger-ui
    - /swagger-resources

# 日志配置
logging:
  level:
    com.hnkjzy.gateway: debug