server:
  port: 8081

spring:
  application:
    name: user-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    url: jdbc:mysql://localhost:3306/cloud_takeout?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ===== 05-4 新增：JWT配置 =====
jwt:
  secret: cloud-takeout-secret-key-2026-512-bit-long-secure-key-for-jwt-signing
  expiration: 7200   # Token过期时间（秒），2小时

logging:
  level:
    com.hnkjzy: debug
